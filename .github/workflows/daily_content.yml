name: Daily IELTS Content

on:
  schedule:
    - cron: '0 */4 * * *' # Run every 4 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (ffmpeg, fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "POLLINATIONS_API_KEY=${{ secrets.POLLINATIONS_API_KEY }}" > .env
          # Add other non-secret env vars here if needed

      - name: Cache Vosk Model
        uses: actions/cache@v3
        with:
          path: vosk-model-small-en-us-0.15
          key: vosk-model-v1

      - name: Download Vosk Model
        run: |
          python download_model.py

      - name: Generate Content
        run: |
          python generate_content.py

      - name: Assemble Video
        run: |
          python assemble_video.py

      - name: Archive Video Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ielts-video
          path: ielts_short.mp4
          retention-days: 5
      
      - name: Publish to Social Media
        env:
          # YouTube
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          # Instagram
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.IG_USER_ID }}
          # Facebook
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          # Threads
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          # TikTok
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          # Twitter
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # VK
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
        run: |
          python publish_content.py

      - name: Commit Topic History (Memory)
        if: always()
        continue-on-error: true
        run: |
          git config --global user.name "IELTS Zoom Bot"
          git config --global user.email "bot@ieltszoom.ai"
          git add topic_history.txt 2>/dev/null || echo "File not found"
          git commit -m "Update topic history [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || echo "Push failed"
